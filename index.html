<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Odin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-upper">
        <img class="header-image" src="Images/logo.png" alt="Granger logo" width="250">
        <ul class="list">
            <li><a href="caitlin" alt="link to Caitlin page">Caitlin</a></li>
            <li><a href="peter" alt="link to Peter page">Peter</a></li>
            <li><a href="rocco" alt="link to Rocco page">Rocco</a></li>
            <li><a href="luna" alt="link to Luna page">Luna</a></li>
        </ul>
        </div>
        <div class="header-lower">   
            <div class="header-lower-left">
                <div class="hero-main-text">This Family Is Awesome!</div>
                <div class="hero-secondary-text">Look how cute they all are without any kids!<br>Are you jealous of how happy they are?</div>
                
                <button class="no-border-button">Sign Up Now!</button>
            </div>    
            <div class="header-lower-right">
                <img class="header-image" src="Images/family-porch.jpg" alt="Family with dogs on the couch" height="250">
            </div>
        </div>     
    </div>

    <div class="family-members">
        <div class="information-class">Meet The Family Members!</div>
            <div class="family-container">
            <div><img class="body-image" src="Images/caitlin.jpg" alt="Caitlin" height="250"><p class="caption">Caitlin</p></div>
            <div><img class="body-image" src="Images/peter.jpg" alt="Peter" height="250"><p class="caption">Peter</p></div>
            <div><img class="body-image" src="Images/rocco2.jpg" alt="Rocco" height="250"><p class="caption">Rocco</p></div>
            <div><img class="body-image" src="Images/luna.jpg" alt="Luna" height="250"><p class="caption">Luna</p></div>
            </div>
    </div>
    
</body>
</html>
